  <text class="t" x="18" y="238">  [20/20] 最终结果:     <tspan class="green b">95%</tspan></text>

  <text class="t" x="18" y="270">  ┌──────────────────────────────────────┐</text>
  <text class="t" x="18" y="290">  │ <tspan class="green b">✅ 模型验证通过</tspan>                       │</text>
