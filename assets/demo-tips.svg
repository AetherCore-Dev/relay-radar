  <text class="t" x="18" y="134">  📦 画像来源: <tspan class="green">🌐 远程最新</tspan></text>
  <text class="t" x="18" y="158">  [1/20] 分析响应中...  <tspan class="dim">收集数据</tspan></text>
  <text class="t" x="18" y="178">  [5/20] 初步结果:      <tspan class="blue">可能是 claude-opus-4</tspan></text>
