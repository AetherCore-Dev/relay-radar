<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440">
  <style>
    .bg { fill: #1e1e2e; }
    .bar { fill: #313244; }
    .dot-r { fill: #f38ba8; }
    .dot-y { fill: #f9e2af; }
    .dot-g { fill: #a6e3a1; }
    .t { font-family: 'Menlo', 'Cascadia Code', monospace; fill: #cdd6f4; font-size: 13px; }
    .dim { fill: #6c7086; }
    .green { fill: #a6e3a1; }
    .yellow { fill: #f9e2af; }
    .blue { fill: #89b4fa; }
    .red { fill: #f38ba8; }
    .pink { fill: #f5c2e7; }
    .b { font-weight: 700; }
  </style>
  <rect class="bg" width="720" height="440" rx="10"/>
  <rect class="bar" width="720" height="32" rx="10 10 0 0"/>
  <circle class="dot-r" cx="18" cy="16" r="5.5"/>
  <circle class="dot-y" cx="36" cy="16" r="5.5"/>
  <circle class="dot-g" cx="54" cy="16" r="5.5"/>
  <text class="t dim" x="360" y="20" text-anchor="middle" font-size="12">Terminal</text>

  <!-- Line 1: prompt -->
  <text class="t dim" x="18" y="58">❯</text>
  <text class="t green" x="34" y="58">npx relay-radar cost claude-opus-4 100000 50000</text>

  <text class="t yellow b" x="18" y="86">💰 claude-opus-4 成本计算:</text>
  <text class="t" x="18" y="108">  输入: 100,000 tokens → <tspan class="blue">$1.50</tspan></text>
  <text class="t" x="18" y="128">  输出: 50,000 tokens  → <tspan class="blue">$3.75</tspan></text>
  <text class="t dim" x="18" y="148">  ────────────────</text>
  <text class="t b" x="18" y="168">  总计: <tspan class="green">$5.25</tspan> <tspan class="dim">(≈ ¥38)</tspan></text>

  <text class="t" x="18" y="204"></text>
  <text class="t dim" x="18" y="204">❯</text>
  <text class="t green" x="34" y="204">npx relay-radar tips</text>

  <text class="t yellow b" x="18" y="232">🧙 Claude Code 省钱秘籍</text>

  <text class="t" x="18" y="258">  1. 🔄 <tspan class="blue">模型路由</tspan> <tspan class="green">(省40-60%)</tspan></text>
  <text class="t dim" x="18" y="276">     简单任务用 Sonnet，复杂推理用 Opus</text>

  <text class="t" x="18" y="300">  2. 📦 <tspan class="blue">Prompt Cache</tspan> <tspan class="green">(省30-50%)</tspan></text>
  <text class="t dim" x="18" y="318">     缓存读取仅 1/10 价格</text>

  <text class="t" x="18" y="342">  3. 🧠 <tspan class="blue">控制 Thinking</tspan> <tspan class="green">(省10-20%)</tspan></text>
  <text class="t dim" x="18" y="360">     export MAX_THINKING_TOKENS=10000</text>

  <text class="t" x="18" y="384">  4. ✂️ <tspan class="blue">精简输出</tspan> <tspan class="green">(省15-30%)</tspan></text>
  <text class="t dim" x="18" y="402">     加 "简洁回复" + max_tokens 限制</text>

  <text class="t pink" x="18" y="430">  不需要API Key，复制粘贴就能用 →</text>
</svg>
